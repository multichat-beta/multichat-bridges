# Runtime-rendered by Synapse entrypoint when bridge tokens are available
id: telegram
url: http://telegram:29318
as_token: "${TELEGRAM_AS_TOKEN}"
hs_token: "${TELEGRAM_HS_TOKEN}"
sender_localpart: telegrambot
rate_limited: false
namespaces:
  users:
    - regex: ^@telegrambot:${SYNAPSE_SERVER_NAME}$
      exclusive: true
    - regex: ^@telegram_.*:${SYNAPSE_SERVER_NAME}$
      exclusive: true
de.sorunome.msc2409.push_ephemeral: true
receive_ephemeral: true
org.matrix.msc3202: true
